<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>STIMA360 BUY 0.2</title><link rel="stylesheet" href="/buy-admin/assets/app.css"></head><body><header><div><b>STIMA360 OS</b><span>BUY 0.2</span></div><nav><a href="/core-admin/">CORE</a><a href="/property-admin/">PROPERTY</a><a href="/match-admin/">MATCH</a></nav></header><main><section class="hero"><div><h1>Workflow acquirenti</h1><p>Richieste, match reali, proposte, visite, finanza e prossime azioni.</p></div><button id="newBtn">Nuova richiesta</button></section><section id="kpi" class="kpis"></section><section class="toolbar"><input id="search" placeholder="Cerca richiesta o contatto"><select id="status"><option value="">Tutti gli stati</option><option>draft</option><option>active</option><option>paused</option><option>satisfied</option><option>closed</option></select><select id="priority"><option value="">Tutte le priorità</option><option>urgent</option><option>high</option><option>normal</option><option>low</option></select><button id="reload">Aggiorna</button></section><section class="layout"><div class="panel"><table><thead><tr><th>Richiesta</th><th>Contatto</th><th>Stato</th><th>Match</th><th>Prossima azione</th></tr></thead><tbody id="rows"></tbody></table></div><aside id="detail"><p>Seleziona una richiesta.</p></aside></section></main><dialog id="modal"><form id="form"><h2>Nuova richiesta BUY</h2><label>ID contatto<input name="contact_id" type="number" required></label><label>ID lead<input name="lead_id" type="number"></label><label>Titolo<input name="title" required></label><div class="grid"><label>Budget target<input name="budget_target" type="number"></label><label>Budget massimo<input name="budget_max" type="number"></label><label>Superficie minima<input name="surface_min" type="number"></label><label>Camere minime<input name="bedrooms_min" type="number"></label></div><menu><button type="button" class="secondary" id="cancel">Annulla</button><button type="submit">Salva</button></menu></form></dialog><dialog id="actionModal"><form id="actionForm"><h2 id="actionTitle">Registra azione</h2><input type="hidden" name="match_id"><label>Azione<select name="action"><option value="proposed">Proposto</option><option value="discarded">Scartato</option><option value="interested">Interessato</option><option value="visit_requested">Visita richiesta</option><option value="visit_scheduled">Visita programmata</option><option value="visited">Visitato</option><option value="offer_candidate">Possibile offerta</option></select></label><label>Motivo<select name="reason_code"><option value="">—</option><option>price_too_high</option><option>wrong_location</option><option>too_small</option><option>too_large</option><option>missing_elevator</option><option>wrong_floor</option><option>poor_condition</option><option>no_parking</option><option>no_outdoor_space</option><option>already_seen</option><option>not_available</option><option>buyer_decision</option><option>agent_decision</option><option>other</option></select></label><label>Note<textarea name="notes"></textarea></label><menu><button type="button" class="secondary" id="actionCancel">Annulla</button><button type="submit">Registra</button></menu></form></dialog><dialog id="taskModal"><form id="taskForm"><h2>Nuovo task CORE</h2><label>Titolo<input name="title" required></label><label>Scadenza<input name="due_at" type="datetime-local"></label><label>Priorità<select name="priority"><option>normal</option><option>high</option><option>urgent</option><option>low</option></select></label><label>Descrizione<textarea name="description"></textarea></label><menu><button type="button" class="secondary" id="taskCancel">Annulla</button><button type="submit">Crea task</button></menu></form></dialog><div id="toast"></div><script src="/buy-admin/assets/app.js"></script></body></html>
